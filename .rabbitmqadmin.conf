# rabbitmqadmin-ng config — lives at ~/.rabbitmqadmin.conf
# Tool: https://github.com/rabbitmq/rabbitmqadmin-ng
# Used by the `rabbitmqadmin` plugin/skill (read-only inspection of vhosts/queues/exchanges).
# Each [section] is a named node you pass as `--node <name>`.
#
# SECRETS: every password below is a placeholder — fill in your own credentials.
# Add one [section] per broker you want to reach (e.g. one per environment or tenant).

# ── Staging (example) ─────────────────────────────────────────────────
[staging]
hostname = "your-staging-instance.rmq2.cloudamqp.com"
port = 443
tls = true
username = "YOUR_USERNAME"
password = "REPLACE_WITH_YOUR_STAGING_PASSWORD"

# ── Production (example) ──────────────────────────────────────────────
[production]
hostname = "your-production-instance.rmq4.cloudamqp.com"
port = 443
tls = true
username = "YOUR_USERNAME"
password = "REPLACE_WITH_YOUR_PRODUCTION_PASSWORD"

# ── Local dev ─────────────────────────────────────────────────────────
[local]
hostname = "localhost"
port = 15672
username = "guest"
password = "guest"
virtual_host = "/"
